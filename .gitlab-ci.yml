stages:
  - build
  - deploy

variables:
  PROJECT_PATH: "src/AbsoluteAlgorithm.Infrastructure/AbsoluteAlgorithm.Infrastructure.csproj"
  PACKAGE_ID: "AbsoluteAlgorithm.Infrastructure"
  NUGET_SOURCE: "https://api.nuget.org/v3/index.json"

.build_base:
  image: mcr.microsoft.com/dotnet/sdk:10.0
  stage: build
  artifacts:
    paths:
      - ./dist/*.nupkg
      - ./dist/*.snupkg # Added to ensure symbols are captured
    expire_in: 1 week

# ==========================================
# 1. DEV: 1.0.0-beta.X -> NuGet.org
# ==========================================
build_dev:
  extends: .build_base
  script:
    - VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' $PROJECT_PATH | tr -d '[:space:]')
    - FULL_VERSION="$VERSION-beta.$CI_PIPELINE_IID"
    - echo "Packing Dev Version $FULL_VERSION"
    # Added /p:ContinuousIntegrationBuild=true to fix Deterministic/SourceLink checks
    - dotnet pack $PROJECT_PATH -c Release -o ./dist /p:PackageId=$PACKAGE_ID /p:PackageVersion=$FULL_VERSION /p:ContinuousIntegrationBuild=true
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

publish_dev:
  stage: deploy
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs: ["build_dev"]
  script:
    - |
      if [ -z "$NUGET_ORG_API_KEY" ]; then 
        echo "ERROR: NUGET_ORG_API_KEY is not defined"; 
        exit 1; 
      fi
    # Removed --no-symbols so your .snupkg file actually gets pushed
    - dotnet nuget push "./dist/*.nupkg" --api-key "$NUGET_ORG_API_KEY" --source "$NUGET_SOURCE" --skip-duplicate
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual

# ==========================================
# 2. MAIN: 1.0.0 (Stable) -> NuGet.org
# ==========================================
build_main:
  extends: .build_base
  script:
    - VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' $PROJECT_PATH | tr -d '[:space:]')
    - echo "Packing Production Version $VERSION"
    - dotnet pack $PROJECT_PATH -c Release -o ./dist /p:PackageId=$PACKAGE_ID /p:PackageVersion=$VERSION /p:ContinuousIntegrationBuild=true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

publish_main:
  stage: deploy
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs: ["build_main"]
  script:
    - |
      if [ -z "$NUGET_ORG_API_KEY" ]; then 
        echo "ERROR: NUGET_ORG_API_KEY is not defined"; 
        exit 1; 
      fi
    - dotnet nuget push "./dist/*.nupkg" --api-key "$NUGET_ORG_API_KEY" --source "$NUGET_SOURCE" --skip-duplicate
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
