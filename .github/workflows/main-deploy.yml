name: Main - Deploy Stable Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-main:
    runs-on: ubuntu-latest
    # Manual approval gate (Create 'Production' environment in Settings > Environments)
    environment: Production 
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract Version
        id: prep
        shell: bash
        run: |
          # Get version from csproj (e.g., 1.0.0)
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/AbsoluteAlgorithm.Infrastructure/AbsoluteAlgorithm.Infrastructure.csproj | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build & Pack Stable
        shell: bash
        run: |
          dotnet pack src/AbsoluteAlgorithm.Infrastructure/AbsoluteAlgorithm.Infrastructure.csproj \
            -c Release \
            -o ./dist \
            /p:PackageId=AbsoluteAlgorithm.Infrastructure \
            /p:Version=${{ steps.prep.outputs.version }}

      - name: Push to NuGet
        shell: bash
        run: |
          dotnet nuget push ./dist/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate