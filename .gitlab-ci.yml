stages:
  - build
  - deploy

variables:
  PROJECT_PATH: "src/FileFormula.Api.Infrastructure/FileFormula.Api.Infrastructure.csproj"
  PACKAGE_ID: "FileFormula.Api.Infrastructure"
  # Official NuGet.org V3 Source
  NUGET_SOURCE: "https://api.nuget.org/v3/index.json"

.build_base:
  image: mcr.microsoft.com/dotnet/sdk:10.0
  stage: build
  artifacts:
    paths:
      - ./dist/*.nupkg
    expire_in: 1 week

# ==========================================
# 1. DEV: 1.0.0-beta.X -> NuGet.org
# ==========================================
build_dev:
  extends: .build_base
  script:
    - VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' $PROJECT_PATH | tr -d '[:space:]')
    - FULL_VERSION="$VERSION-beta.$CI_PIPELINE_IID"
    - echo "Packing Dev Version $FULL_VERSION"
    - dotnet pack $PROJECT_PATH -c Release -o ./dist /p:PackageId=$PACKAGE_ID /p:PackageVersion=$FULL_VERSION
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

publish_dev:
  stage: deploy
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs: ["build_dev"]
  script:
    - dotnet nuget push ./dist/*.nupkg --source $NUGET_SOURCE --api-key $NUGET_ORG_API_KEY --skip-duplicate
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual # Keeps your manual approval button

# ==========================================
# 2. MAIN: 1.0.0 (Stable) -> NuGet.org
# ==========================================
build_main:
  extends: .build_base
  script:
    - VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' $PROJECT_PATH | tr -d '[:space:]')
    - echo "Packing Production Version $VERSION"
    - dotnet pack $PROJECT_PATH -c Release -o ./dist /p:PackageId=$PACKAGE_ID /p:PackageVersion=$VERSION
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

publish_main:
  stage: deploy
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs: ["build_main"]
  script:
    - dotnet nuget push ./dist/*.nupkg --source $NUGET_SOURCE --api-key $NUGET_ORG_API_KEY --skip-duplicate
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual