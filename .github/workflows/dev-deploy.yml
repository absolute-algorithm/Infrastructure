name: Dev - Deploy Prerelease Package

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  publish-dev:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract Version
        id: prep
        shell: bash
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/AbsoluteAlgorithm.Infrastructure/AbsoluteAlgorithm.Infrastructure.csproj | tr -d '[:space:]')
          FULL_VERSION="$VERSION-beta.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Wait for Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: slalithprasad
          minimum-approvals: 1
          issue-title: "Deploy 'Infrastructure' Pre-Release: ${{ steps.prep.outputs.full_version }}"
          issue-body: "Please approve the publish of AbsoluteAlgorithm.Infrastructure version ${{ steps.prep.outputs.full_version }}."

      - name: Build & Pack BETA (Prerelease)
        shell: bash
        run: |
          dotnet pack src/AbsoluteAlgorithm.Infrastructure/AbsoluteAlgorithm.Infrastructure.csproj -c Release -o ./dist \
            /p:PackageId=AbsoluteAlgorithm.Infrastructure \
            /p:PackageVersion=${{ steps.prep.outputs.full_version }}
